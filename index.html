<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kiter Map - Local Dev</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/timeline.css" />
    <link rel="stylesheet" href="css/forecast-table.css" />
    <link rel="stylesheet" href="css/logo.css" />
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module" src="js/main.js"></script>
    
    <div id="model-run-info">Model run: Loading...</div>
    
<div id="app-logo-widget">
    <div class="logo-container">
        <!-- The dynamic Wind-RUC symbol -->
        <svg class="logo-icon" viewBox="0 0 32 32" style="width: 32px; height: 32px; fill: none;">
            <!-- Thick vertical mast on the left -->
            <path d="M 6,30 L 6,6" stroke="#0077a4" stroke-width="2.5" stroke-linecap="round"/>
            
            <!-- The bracket/connection to the windsock at the top -->
            <path d="M 6,6 L 9,3 L 9,11 L 6,8" stroke="#0077a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            
            <!-- The outer contour of the windsock (blowing to the right) -->
            <path d="M 9,3 L 29,5 L 29,11 L 9,11 Z" stroke="#0077a4" stroke-width="2.5" stroke-linejoin="round"/>
            
            <!-- The distinctive vertical stripes from the template -->
            <path d="M 14,3.5 L 14,10.5" stroke="#0077a4" stroke-width="2.5"/>
            <path d="M 19,4 L 19,11" stroke="#0077a4" stroke-width="2.5"/>
            <path d="M 24,4.5 L 24,11" stroke="#0077a4" stroke-width="2.5"/>
        </svg>
        <div class="logo-text">
            <h1>ICON-D2 RUC</h1>
            <h2>The Only Hourly Updated  Forecast</h2>
        </div>
    </div>
</div>

    
</body>
</html>

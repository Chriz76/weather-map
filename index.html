<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ICON-D2 RUC | Hourly Forecast</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/timeline-view.css" />
    <link rel="stylesheet" href="css/forecast-view.css" />
    <link rel="stylesheet" href="css/logo-view.css" />
    <link rel="stylesheet" href="css/legend-view.css" />
    <link rel="stylesheet" href="css/marker-view.css" />
    <link rel="stylesheet" href="css/model-info-view.css" />
    <link rel="stylesheet" href="css/gps-view.css" />
    <script defer src="https://cloud.umami.is/script.js" data-website-id="8a85a60f-4770-4ff7-9210-63badbb5d34c"></script>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module" src="js/main.js"></script>
    
    <div class="model-info">Model run: Loading...</div>
<script>
  // Prüfen, ob der Debug-Modus in der URL aktiv ist
  if (new URLSearchParams(window.location.search).get('debug') === 'true') {
    // 1. Eruda Skript dynamisch nachladen
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/eruda';
    document.body.appendChild(script);
    
    // 2. Initialisieren, sobald das Skript geladen ist
    script.onload = function () {
      eruda.init({
        theme: 'dark',
        defaults: {
          displaySize: 50, // Macht das Fenster standardmäßig auf halbe Bildschirmhöhe
          transparency: 90
        }
      });
      console.log('Eruda DevTools erfolgreich geladen. Viel Spaß beim Debuggen!');
    };
  }
</script>
    
</body>
</html>

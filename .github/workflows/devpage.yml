name: Deploy Develop to Subfolder

on:
  push:
    branches:
      - develop
      - mvc  # Füge hier die Branches hinzu, die du nutzt
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}dev/
    runs-on: ubuntu-latest
    steps:
      # 1. Schritt: Wir holen uns den aktuellen Stand aus dem MAIN Branch (die Hauptseite)
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main_site

      # 2. Schritt: Wir holen uns den Code aus dem aktuellen Entwicklungs-Branch (mvc/develop)
      - name: Checkout Current Branch
        uses: actions/checkout@v4
        with:
          path: dev_site

      # 3. Schritt: Wir bauen das Ganze im "Root"-Ordner zusammen
      - name: Merge sites together
        run: |
          mkdir workspace
          # Kopiere die Hauptseite in das Hauptverzeichnis
          cp -r main_site/* workspace/
          # Erstelle den dev-Unterordner und kopiere den Entwicklungs-Code hinein
          mkdir -p workspace/dev
          cp -r dev_site/* workspace/dev/
          # Bereinige die temporären Checkout-Ordner, damit sie nicht mit hochgeladen werden
          rm -rf workspace/dev/main_site workspace/dev/dev_site workspace/main_site workspace/workspace

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './workspace'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy Develop to Subfolder

on:
  push:
    branches:
      - develop
      - mvc  # Füge hier die Branches hinzu, die du nutzt
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}dev/
    runs-on: ubuntu-latest
    steps:
      # 1. Schritt: Wir holen uns den aktuellen Stand aus dem MAIN Branch (die Hauptseite)
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main_site

      # 2. Schritt: Wir holen uns den Code aus dem aktuellen Entwicklungs-Branch (mvc/develop)
      - name: Checkout Current Branch
        uses: actions/checkout@v4
        with:
          path: dev_site

      # 3. Beide Welten sicher verschmelzen
      - name: Merge sites together
        run: |
          mkdir workspace
          
          # Hauptseite ins Root-Verzeichnis kopieren
          if [ -d "main_site" ]; then
            cp -r main_site/* workspace/
          fi
          
          # Dev-Seite sauber in den Unterordner isolieren
          mkdir -p workspace/dev
          if [ -d "dev_site" ]; then
            # Wir kopieren explizit alles einzeln rüber, um Linux-Fehler zu vermeiden
            cd dev_site
            cp -r . ../workspace/dev/
            cd ..
          fi
          
          # Extrem vorsichtiges Löschen NUR der temporären Checkout-Ordner
          rm -rf workspace/main_site workspace/dev_site

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './workspace'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
